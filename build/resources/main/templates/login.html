<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head('로그인')}"></head>
<body class="login-page">
<div class="login-wrap">
    <div class="login-card">
        <div class="login-header">
            <h1>🎓</h1>
            <h2 th:text="#{app.name}">학생 성적 관리 시스템</h2>
        </div>

        <div th:if="${loginError}" class="alert alert-error" th:text="#{login.error}"></div>

        <form th:action="@{/login}" th:object="${loginForm}" method="post" class="form">
            <div class="form-group">
                <label th:text="#{login.id}">아이디</label>
                <input type="text" th:field="*{username}" class="form-input" placeholder="admin"/>
            </div>
            <div class="form-group">
                <label th:text="#{login.password}">비밀번호</label>
                <input type="password" th:field="*{password}" class="form-input" placeholder="1234"/>
            </div>
            <button type="submit" class="btn btn-primary btn-full" th:text="#{login.submit}">로그인</button>
        </form>

        <p class="login-hint">테스트 계정: admin / 1234</p>
    </div>
</div>
</body>
</html>
