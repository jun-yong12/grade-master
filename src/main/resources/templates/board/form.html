<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/layout :: head('학생 등록/수정')}"></head>
<body>
<aside th:replace="~{fragments/layout :: sidebar}"></aside>

<div class="container">
    <div class="card">
        <h2 th:text="${studentId != null ? '학생 정보 수정' : '새 학생 등록'}"></h2>

        <form th:action="${studentId != null ? '/students/' + studentId + '/edit' : '/students'}"
              th:object="${studentForm}" method="post" class="form">

            <div class="form-group">
                <label>학번 <span class="required">*</span></label>
                <input type="text" th:field="*{studentNumber}" placeholder="예: 20240001" class="form-input"
                       th:classappend="${#fields.hasErrors('studentNumber')} ? 'input-error'"/>
                <span th:if="${#fields.hasErrors('studentNumber')}" th:errors="*{studentNumber}" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label>이름 <span class="required">*</span></label>
                <input type="text" th:field="*{name}" placeholder="학생 이름" class="form-input"
                       th:classappend="${#fields.hasErrors('name')} ? 'input-error'"/>
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-msg"></span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>학년</label>
                    <select th:field="*{grade}" class="form-input">
                        <option value="">-- 선택 --</option>
                        <option value="1학년">1학년</option>
                        <option value="2학년">2학년</option>
                        <option value="3학년">3학년</option>
                        <option value="4학년">4학년</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>과</label>
                    <input type="text" th:field="*{department}" placeholder="예: 컴퓨터공학과" class="form-input"/>
                </div>
            </div>

            <div class="form-group">
                <label>전화번호</label>
                <input type="tel" th:field="*{phone}" placeholder="예: 010-1234-5678" class="form-input"/>
            </div>

            <div class="form-group">
                <label>이메일</label>
                <input type="email" th:field="*{email}" placeholder="example@school.kr" class="form-input"/>
            </div>

            <div class="form-group">
                <label>상태</label>
                <select th:field="*{status}" class="form-input">
                    <option value="재학">재학</option>
                    <option value="휴학">휴학</option>
                </select>
            </div>

            <div class="form-actions">
                <a th:href="@{/students}" class="btn btn-secondary">취소</a>
                <button type="submit" class="btn btn-primary"
                        th:text="${studentId != null ? '수정 완료' : '등록하기'}"></button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
